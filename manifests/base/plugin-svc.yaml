apiVersion: v1
kind: Service
metadata:
  annotations:
    service.alpha.openshift.io/serving-cert-secret-name: gitops-export-console-cert
  labels:
    app: gitops-export-console
    app.kubernetes.io/instance: gitops-export-console
    app.kubernetes.io/name: gitops-export-console
    app.kubernetes.io/part-of: gitops-export-console
  name: gitops-export-console
spec:
  type: ClusterIP
  ports:
    - name: 9443-tcp
      port: 9443
      targetPort: 9443
  selector:
    app: gitops-export-console
    app.kubernetes.io/instance: gitops-export-console
    app.kubernetes.io/name: gitops-export-console
    app.kubernetes.io/part-of: gitops-export-console
