apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: scrubctl
spec:
  version: {{ .TagName }}
  homepage: https://github.com/turbra/gitops-export-plugin
  shortDescription: Run scrubctl through kubectl plugin compatibility
  description: |
    scrubctl scans a namespace, classifies live resources, strips cluster-generated
    fields, writes a ZIP archive with include/cleanup/review groupings, and generates Argo CD
    Application YAML for Git-managed rollout. The krew install provides kubectl plugin compatibility
    while scrubctl remains the primary standalone command.
  caveats: |
    scrubctl only supports the curated GitOps Export resource set in v1.
    OpenShift resource kinds such as Route, BuildConfig, ImageStream, and ImageStreamTag are first-class.
  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      {{addURIAndSha "https://github.com/turbra/gitops-export-plugin/releases/download/{{ .TagName }}/scrubctl-{{ .TagName }}-linux-amd64.tar.gz" .TagName }}
      files:
        - from: scrubctl
          to: kubectl-scrubctl
      bin: kubectl-scrubctl
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      {{addURIAndSha "https://github.com/turbra/gitops-export-plugin/releases/download/{{ .TagName }}/scrubctl-{{ .TagName }}-linux-arm64.tar.gz" .TagName }}
      files:
        - from: scrubctl
          to: kubectl-scrubctl
      bin: kubectl-scrubctl
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      {{addURIAndSha "https://github.com/turbra/gitops-export-plugin/releases/download/{{ .TagName }}/scrubctl-{{ .TagName }}-darwin-amd64.tar.gz" .TagName }}
      files:
        - from: scrubctl
          to: kubectl-scrubctl
      bin: kubectl-scrubctl
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      {{addURIAndSha "https://github.com/turbra/gitops-export-plugin/releases/download/{{ .TagName }}/scrubctl-{{ .TagName }}-darwin-arm64.tar.gz" .TagName }}
      files:
        - from: scrubctl
          to: kubectl-scrubctl
      bin: kubectl-scrubctl
    - selector:
        matchLabels:
          os: windows
          arch: amd64
      {{addURIAndSha "https://github.com/turbra/gitops-export-plugin/releases/download/{{ .TagName }}/scrubctl-{{ .TagName }}-windows-amd64.zip" .TagName }}
      files:
        - from: scrubctl.exe
          to: kubectl-scrubctl.exe
      bin: kubectl-scrubctl.exe
    - selector:
        matchLabels:
          os: windows
          arch: arm64
      {{addURIAndSha "https://github.com/turbra/gitops-export-plugin/releases/download/{{ .TagName }}/scrubctl-{{ .TagName }}-windows-arm64.zip" .TagName }}
      files:
        - from: scrubctl.exe
          to: kubectl-scrubctl.exe
      bin: kubectl-scrubctl.exe
